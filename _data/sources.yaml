# Manually specified publications/sources for the automatic citation system.
#
# Each entry is either:
#   1. A DOI (or other Manubot-citeable id) that is fetched automatically, e.g.:
#        - id: doi:10.1000/xyz123
#          type: paper
#   2. A fully manual entry with all fields filled in (title, authors, publisher, date, link).
#
# After editing, run the cite action (`python _cite/cite.py`) to regenerate _data/citations.yaml,
# which powers the publication list on the Research page.
#
# TODO: Populate the lab's publications. The fastest path is usually to add the PI's ORCID in
#       _data/orcid.yaml so works are pulled automatically. See the Research page for a manually
#       curated "Selected Publications" list that can be migrated here.
#
# Example (remove or replace):
# - id: doi:10.0000/example
#   type: paper
#   tags:
#     - healthcare ai
